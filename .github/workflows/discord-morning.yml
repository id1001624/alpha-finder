name: Discord Morning Recap

on:
  workflow_dispatch:
  schedule:
    - cron: '17 23 * * *'

concurrency:
  group: discord-morning-recap
  cancel-in-progress: false

jobs:
  morning-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send morning recap
        run: |
          python scripts/push_alerts_from_ai_decision.py --auto-latest --channel discord --mode morning